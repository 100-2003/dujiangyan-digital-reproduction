<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>都江堰智慧水利可视化监测大屏</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        html, body {
            width: 100%;
            height: 100vh;
            background-color: #0a111a;
            background-image: url('images/background-2.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: auto;
            overflow-x: hidden;
        }

        .page-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0;
        }

        #viewport {
            width: 1920px;
            height: 1080px;
            flex-shrink: 0;
            transform-origin: center top;
            transition: transform 0.1s ease;
            pointer-events: auto;
            position: relative;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent;
        }

        .top-header {
            width: 100%;
            height: 90px;
            background: linear-gradient(90deg,
                rgba(10, 30, 35, 0.8) 0%,
                rgba(26, 55, 60, 0.7) 50%,
                rgba(10, 30, 35, 0.8) 100%);
            border-bottom: 2px solid rgba(102, 240, 208, 0.4);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(102, 240, 208, 0.15);
        }
        .top-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(102, 240, 208, 0.1) 50%,
                transparent 100%);
            animation: lightFlow 8s linear infinite;
        }
        @keyframes lightFlow {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .header-title {
            font-size: 38px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 8px;
            position: relative;
            z-index: 1;
            background: linear-gradient(180deg, #ffffff 0%, #66f0d0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow:
                0 0 12px rgba(102, 240, 208, 0.9),
                0 0 24px rgba(102, 240, 208, 0.5),
                0 0 36px rgba(102, 240, 208, 0.3);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #66f0d0;
            font-size: 22px;
            font-weight: 500;
            text-shadow: 0 0 10px rgba(102, 240, 208, 0.7);
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }
        .back-btn{
            cursor: pointer;
            padding: 6px 12px;
            border: 1px solid #66f0d0;
            border-radius: 6px;
            font-size: 18px;
        }

        .main {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .bottom-screen {
            display: grid;
            grid-template-columns: 1.1fr 2fr 1.2fr;
            gap: 15px;
            background: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border: none !important;
            border-radius: 4px;
            padding: 15px;
            height: 950px;
        }

        .left-bar {
            display: flex;
            flex-direction: column;
            padding: 0;
            height: 100%;
            gap: 15px;
        }

        .left-bar .chart-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 15px;
            min-height: 0;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(102, 240, 208, 0.3);
            border-radius: 12px;
        }

        .chart-box h2 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #66f0d0;
            background: rgba(102, 240, 208, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-left: 3px solid #66f0d0;
            padding: 8px 12px;
            border-radius: 4px 0 0 4px;
            border: 1px solid rgba(102, 240, 208, 0.3);
            flex-shrink: 0;
        }

        .chart {
            flex: 1;
            width: 100%;
            min-height: 0;
            background: transparent;
        }

        .right-bar {
            display: flex;
            flex-direction: column;
            padding: 0;
            height: 100%;
            gap: 15px;
        }

        .baoping-module {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(102, 240, 208, 0.3);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            width: 100%;
        }

        .baoping-module h2 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #66f0d0;
            background: rgba(102, 240, 208, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-left: 3px solid #66f0d0;
            padding: 8px 12px;
            border-radius: 4px 0 0 4px;
            border: 1px solid rgba(102, 240, 208, 0.3);
            flex-shrink: 0;
        }

        .baoping-content {
            flex: 1;
            position: relative;
            min-height: 0;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        #baopingCanvas {
            width: 100%;
            flex: 1;
            min-height: 200px;
            background: linear-gradient(180deg, #0a1628 0%, #1e3a5f 50%, #0f172a 100%);
            border-radius: 8px;
        }

        .baoping-legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 8px;
            flex-wrap: wrap;
            padding: 6px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .baoping-legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .baoping-legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .baoping-legend-item span {
            color: #66f0d0;
        }

        .baoping-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #66f0d0;
            margin-top: 6px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            flex-shrink: 0;
        }

        .baoping-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
            flex-shrink: 0;
        }

        .baoping-control-group {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .baoping-control-label {
            display: flex;
            justify-content: space-between;
            color: #06b6d4;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.75rem;
        }

        .baoping-value-display {
            font-family: 'Inter', monospace;
            font-weight: 700;
            color: #06b6d4;
            font-size: 0.85rem;
        }

        .baoping-slider {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #1e40af, #3b82f6, #06b6d4);
            border-radius: 2px;
            outline: none;
        }

        .baoping-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #06b6d4 0%, #0891b2 100%);
            border-radius: 50%;
            cursor: grab;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.6);
            border: 2px solid #fff;
        }

        .baoping-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .baoping-stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px;
            border-radius: 4px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .baoping-stat-value {
            font-size: 0.9rem;
            font-weight: 900;
            color: #06b6d4;
            font-family: 'Inter', monospace;
        }

        .baoping-stat-label {
            font-size: 0.6rem;
            color: #66f0d0;
            margin-top: 2px;
            text-transform: uppercase;
        }

        .center-main {
            background: transparent !important;
            border: none !important;
            padding: 0;
        }
    </style>
</head>

<body>
<div class="page-wrapper">
    <div id="viewport">
        <div class="container">
            <div class="top-header">
                <div class="header-title">都江堰智慧水利可视化监测大屏</div>
                <div class="header-right">
                    <span id="current-time"></span>
                    <div class="back-btn" onclick="location.href='index.html'">← 返回主页</div>
                </div>
            </div>

            <div class="main">
                <div class="bottom-screen">
                    <div class="left-bar">
                        <div class="chart-box">
                            <h2>鱼嘴 —— 分流比例演变</h2>
                            <div id="chart1" class="chart"></div>
                        </div>
                        <div class="chart-box">
                            <h2>飞沙堰 —— 历年排沙量</h2>
                            <div id="chart2" class="chart"></div>
                        </div>
                        <div class="chart-box">
                            <h2>宝瓶口 —— 历年流量变化</h2>
                            <div id="chart3" class="chart"></div>
                        </div>
                    </div>

                    <div class="center-main"></div>

                    <div class="right-bar">
                        <div class="baoping-module">
                            <h2>⚱️ 宝瓶口窄口控流原理</h2>
                            <div class="baoping-content">
                                <canvas id="baopingCanvas"></canvas>
                                <div class="baoping-legend">
                                    <div class="baoping-legend-item"><div class="baoping-legend-color" style="background:linear-gradient(90deg,#3b82f6,#06b6d4)"></div><span>缓流区</span></div>
                                    <div class="baoping-legend-item"><div class="baoping-legend-color" style="background:#d97706"></div><span>底层泥沙</span></div>
                                    <div class="baoping-legend-item"><div class="baoping-legend-color" style="background:#06b6d4;box-shadow:0 0 10px #06b6d4"></div><span>临界流</span></div>
                                    <div class="baoping-legend-item"><div class="baoping-legend-color" style="background:#10b981"></div><span>下游出流</span></div>
                                </div>
                                <div class="baoping-info">
                                    <span>粒子: <strong id="bpParticleCount">1500</strong></span>
                                    <span>清水: <strong id="bpClearCount">0</strong></span>
                                    <span>泥沙: <strong id="bpSandCount">0</strong></span>
                                    <span>FPS: <strong id="bpFps">60</strong></span>
                                </div>
                                <div class="baoping-controls">
                                    <div class="baoping-control-group">
                                        <div class="baoping-control-label"><span>流量 Q</span><span class="baoping-value-display"><span id="bpFlowValue">800</span> m³/s</span></div>
                                        <input type="range" class="baoping-slider" id="bpFlowSlider" min="200" max="3000" value="800" step="50">
                                    </div>
                                    <div class="baoping-control-group">
                                        <div class="baoping-control-label"><span>宽度 b</span><span class="baoping-value-display"><span id="bpWidthValue">20</span> m</span></div>
                                        <input type="range" class="baoping-slider" id="bpWidthSlider" min="15" max="40" value="20" step="1">
                                    </div>
                                </div>
                                <div class="baoping-stats">
                                    <div class="baoping-stat-card"><div class="baoping-stat-value" id="bpUpstreamLevel">+727.5</div><div class="baoping-stat-label">壅水位(m)</div></div>
                                    <div class="baoping-stat-card"><div class="baoping-stat-value" id="bpFroudeNumber">0.45</div><div class="baoping-stat-label">Fr</div></div>
                                    <div class="baoping-stat-card"><div class="baoping-stat-value" id="bpVelocity">2.8</div><div class="baoping-stat-label">流速(m/s)</div></div>
                                    <div class="baoping-stat-card"><div class="baoping-stat-value" id="bpOverflowPercent">0%</div><div class="baoping-stat-label">溢流比</div></div>
                                </div>
                            </div>
                        </div>

                        <div class="baoping-module">
                            <h2>🏞️ 飞沙堰排沙原理</h2>
                            <div class="baoping-content">
                                <canvas id="feishaCanvas"></canvas>
                                <div class="baoping-legend">
                                    <div class="baoping-legend-item"><div class="baoping-legend-color" style="background:#3b82f6;box-shadow:0 0 8px #3b82f6"></div><span>表层清水</span></div>
                                    <div class="baoping-legend-item"><div class="baoping-legend-color" style="background:#d97706;box-shadow:0 0 8px #d97706"></div><span>底层泥沙</span></div>
                                    <div class="baoping-legend-item"><div class="baoping-legend-color" style="background:#ef4444"></div><span>溢流排沙</span></div>
                                </div>
                                <div class="baoping-controls">
                                    <div class="baoping-control-group">
                                        <div class="baoping-control-label"><span>流量 Q</span><span class="baoping-value-display"><span id="fsFlowValue">2800</span> m³/s</span></div>
                                        <input type="range" class="baoping-slider" id="fsFlowSlider" min="500" max="5000" value="2800" step="100">
                                    </div>
                                    <div class="baoping-control-group">
                                        <div class="baoping-control-label"><span>泥沙浓度</span><span class="baoping-value-display"><span id="fsSedimentValue">2.5</span> kg/m³</span></div>
                                        <input type="range" class="baoping-slider" id="fsSedimentSlider" min="0.5" max="8" value="2.5" step="0.1">
                                    </div>
                                </div>
                                <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;">
                                    <button class="baoping-control-label" style="justify-content:center;cursor:pointer;background:rgba(0,0,0,0.3);border-radius:4px;padding:4px;border:1px solid rgba(255,255,255,0.1)" onclick="setFsMode('section')">📐 剖面视图</button>
                                    <button class="baoping-control-label" style="justify-content:center;cursor:pointer;background:rgba(0,0,0,0.3);border-radius:4px;padding:4px;border:1px solid rgba(255,255,255,0.1)" onclick="setFsMode('top')">🗺️ 平面视图</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hour = String(now.getHours()).padStart(2, '0');
        const minute = String(now.getMinutes()).padStart(2, '0');
        const second = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('current-time').innerText = `${year}-${month}-${day} ${hour}:${minute}:${second}`;
    }
    updateTime();
    setInterval(updateTime, 1000);

    const viewport = document.getElementById('viewport');
    let scale = 1;
    const minScale = 0.3;
    const maxScale = 1.5;
    const step = 0.05;

    function updateScale() {
        viewport.style.transform = `scale(${scale})`;
    }

    document.addEventListener('wheel', (e) => {
        if (e.ctrlKey) {
            e.preventDefault();
            if (e.deltaY < 0) {
                if (scale < maxScale) scale += step;
            } else {
                if (scale > minScale) scale -= step;
            }
            updateScale();
        }
    }, { passive: false });

    window.onload = () => {
        updateScale();
    };

    const chart1 = echarts.init(document.getElementById('chart1'));
    chart1.setOption({
        backgroundColor: "transparent",
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" }, backgroundColor: "rgba(0,0,0,0.8)", textStyle: { color: "#fff", fontSize: 12 } },
        legend: { data: ["内江", "外江"], top: 0, left: "left", textStyle: { color: "#4ECDC4", fontSize: 11, fontWeight: "bold" }, itemGap: 20 },
        grid: { left: "0%", right: "8%", bottom: "8%", top: "18%", containLabel: true },
        yAxis: { type: "category", data: ["传统（四六开）|枯水期", "传统（四六开）|汛期", "1974~至今|枯水期", "1974~至今|汛期", "2020年后（近年来）|枯水期", "2020年后（近年来）|汛期"], axisLine: { lineStyle: { color: "#4ECDC4" } }, axisLabel: { color: "#fff", fontSize: 10, fontWeight: "bold" }, splitLine: { show: false } },
        xAxis: { type: "value", max: 100, min: 0, interval: 20, axisLine: { lineStyle: { color: "#4ECDC4" } }, axisLabel: { color: "#fff", fontSize: 10, fontWeight: "bold", formatter: "{value}%" }, splitLine: { lineStyle: { color: "rgba(255,255,255,0.2)" } } },
        series: [
            { name: "内江", type: "bar", stack: "total", data: [60.0, 40.0, 75.0, 37.5, 62.0, 38.0], itemStyle: { color: "#4ECDC4", borderRadius: [0, 6, 6, 0] }, label: { show: true, position: "inside", color: "#000", fontSize: 11, fontWeight: "bold", formatter: "{c}%" } },
            { name: "外江", type: "bar", stack: "total", data: [40.0, 60.0, 25.0, 62.5, 38.0, 62.0], itemStyle: { color: "#00897B" }, label: { show: true, position: "inside", color: "#fff", fontSize: 11, fontWeight: "bold", formatter: "{c}%" } }
        ]
    });

    const chart2 = echarts.init(document.getElementById('chart2'));
    chart2.setOption({
        backgroundColor: "transparent",
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" }, backgroundColor: "rgba(0,0,0,0.7)", textStyle: { color: "#fff" } },
        legend: { data: ["内江排沙量", "飞沙堰排沙量"], bottom: "10px", left: "center", textStyle: { color: "#4ECDC4" } },
        grid: { left: "8%", right: "5%", bottom: "15%", top: "25%", containLabel: true },
        xAxis: { type: "category", data: ["2020", "2021", "2022", "2023"], axisLine: { lineStyle: { color: "#4ECDC4" } }, axisLabel: { color: "#4ECDC4", fontSize: 14 } },
        yAxis: { type: "value", axisLine: { lineStyle: { color: "#4ECDC4" } }, axisLabel: { color: "#4ECDC4", formatter: "{value} 万吨" }, splitLine: { lineStyle: { color: "rgba(255,255,255,0.2)" } } },
        series: [
            { name: "内江排沙量", type: "bar", data: [68.2, 70.5, 65.7, 71.8], itemStyle: { color: "#4ECDC4" }, barWidth: "35%" },
            { name: "飞沙堰排沙量", type: "bar", data: [63.8, 66.2, 61.5, 67.4], itemStyle: { color: "#00897B" }, barWidth: "35%" }
        ]
    });

    const chart3 = echarts.init(document.getElementById('chart3'));
    chart3.setOption({
        backgroundColor: "transparent",
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" }, backgroundColor: "rgba(50,50,50,0.8)", textStyle: { color: "#fff" } },
        legend: { data: ["枯水期", "平水期", "汛期"], top: "bottom", left: "center", textStyle: { color: "#4ECDC4", fontSize: 13 } },
        grid: { left: "8%", right: "5%", bottom: "20%", top: "15%", containLabel: true },
        xAxis: { type: "category", data: ["2011", "2013", "2015", "2017", "2019", "2021", "2023"], axisLine: { lineStyle: { color: "#4ECDC4" } }, axisLabel: { color: "#4ECDC4", fontSize: 12 } },
        yAxis: { type: "value", min: 0, max: 500, interval: 100, axisLine: { lineStyle: { color: "#4ECDC4" } }, axisLabel: { color: "#4ECDC4", formatter: "{value} m³/s" }, splitLine: { lineStyle: { color: "rgba(255,255,255,0.2)" } } },
        series: [
            { name: "枯水期", type: "bar", data: [192, 185, 188, 191, 189, 199, 196], itemStyle: { color: "#4ECDC4" } },
            { name: "平水期", type: "bar", data: [338, 329, 332, 335, 333, 346, 342], itemStyle: { color: "#26A69A" } },
            { name: "汛期", type: "bar", data: [425, 410, 415, 422, 418, 445, 438], itemStyle: { color: "#00897B" } }
        ]
    });

    const bpCanvas = document.getElementById('baopingCanvas');
    const bpCtx = bpCanvas.getContext('2d');
    let bpWidth = 0, bpHeight = 0;
    function resizeBpCanvas() {
        const rect = bpCanvas.parentElement.getBoundingClientRect();
        bpCanvas.width = rect.width;
        bpCanvas.height = rect.height - 140;
        bpWidth = bpCanvas.width;
        bpHeight = bpCanvas.height;
    }
    const BP_PHYSICS = { g: 9.81, Cd: 0.75, weirElev: 729.0, bedElev: 726.85, designWidth: 20, designFlow: 800 };
    const bpState = { flow: 800, width: 20, time: 0, fps: 60, lastTime: 0 };
    const BP_CONFIG = { count: 1500, clearRatio: 0.7, sandRatio: 0.3, maxHistory: 6, spawnRate: 3 };
    let bpParticles = [];
    function calculateBpHydraulics(Q, b) {
        let H = 2.0;
        for (let i = 0; i < 20; i++) {
            const Q_calc = BP_PHYSICS.Cd * b * H * Math.sqrt(2 * BP_PHYSICS.g * H);
            const error = Q_calc - Q;
            H = H * (1 - error / Q_calc * 0.5);
            if (Math.abs(error) < 0.1) break;
        }
        const hc = Math.pow(Q * Q / (BP_PHYSICS.g * b * b), 1/3);
        const v = Q / (b * hc);
        const Fr = v / Math.sqrt(BP_PHYSICS.g * hc);
        const upstreamLevel = BP_PHYSICS.bedElev + H;
        const overflowHeight = Math.max(0, upstreamLevel - BP_PHYSICS.weirElev);
        const overflowRatio = overflowHeight > 0 ? Math.min(100, (overflowHeight / 2.0) * 100) : 0;
        return { H, hc, v, Fr, upstreamLevel, overflowRatio };
    }
    function getBpWaterSurfaceY(x, params) {
        const throatX = bpWidth * 0.55;
        const backwaterScale = 18;
        if (x < throatX - 80) {
            const backwater = (params.upstreamLevel - BP_PHYSICS.bedElev) * backwaterScale;
            return bpHeight - 70 - backwater;
        } else if (x < throatX - 30) {
            const t = (x - (throatX - 80)) / 50;
            const backwater = (params.upstreamLevel - BP_PHYSICS.bedElev) * backwaterScale;
            const upstreamY = bpHeight - 70 - backwater;
            const throatY = bpHeight - 90;
            return upstreamY + (throatY - upstreamY) * t;
        } else if (x < throatX + 40) {
            return bpHeight - 90;
        } else if (x < throatX + 150) {
            const t = (x - (throatX + 40)) / 110;
            const throatY = bpHeight - 90;
            const downstreamY = bpHeight - 70;
            return throatY + (downstreamY - throatY) * Math.min(1, t);
        } else {
            return bpHeight - 70;
        }
    }
    function getBpBedY(x) { return bpHeight - 50; }
    function getBpVelocity(x, y, params) {
        const waterSurface = getBpWaterSurfaceY(x, params);
        const bedY = getBpBedY(x);
        const depth = waterSurface - bedY;
        const relativeDepth = (waterSurface - y) / depth;
        const baseVel = (bpState.flow / 800) * 2.2;
        let velMultiplier;
        if (relativeDepth < 0.2) velMultiplier = 0.9 + Math.random() * 0.12;
        else if (relativeDepth < 0.6) velMultiplier = 0.6 + Math.random() * 0.12;
        else velMultiplier = 0.35 + Math.random() * 0.08;
        const throatX = bpWidth * 0.55;
        if (x > throatX - 40 && x < throatX + 40) {
            const constriction = 1 + 0.35 * Math.cos((x - throatX) / 40 * Math.PI);
            velMultiplier *= constriction;
        }
        return baseVel * velMultiplier;
    }
    class BpParticle {
        constructor() { this.active = false; this.reset(); }
        reset() {
            const params = calculateBpHydraulics(bpState.flow, bpState.width);
            this.x = -10 - Math.random() * 80;
            const isSand = Math.random() < BP_CONFIG.sandRatio;
            this.type = isSand ? 'sand' : 'clear';
            const waterSurface = getBpWaterSurfaceY(this.x, params);
            const bedY = getBpBedY(this.x);
            const depth = waterSurface - bedY;
            if (this.type === 'sand') {
                const depthFactor = 0.65 + Math.random() * 0.35;
                this.y = waterSurface - depth * depthFactor;
                this.size = 1.5 + Math.random() * 1.5;
            } else {
                const depthFactor = Math.random() * 0.6;
                this.y = waterSurface - depth * depthFactor;
                this.size = 1 + Math.random() * 1;
            }
            this.vx = 0; this.vy = 0; this.history = []; this.active = true;
        }
        update(params) {
            if (!this.active) return;
            const waterSurface = getBpWaterSurfaceY(this.x, params);
            const bedY = getBpBedY(this.x);
            const localVel = getBpVelocity(this.x, this.y, params);
            this.vx = localVel;
            this.x += this.vx;
            if (this.type === 'sand') this.vy = 0.18; else this.vy = -0.04;
            this.y += this.vy;
            if (this.y < waterSurface + 3) { this.y = waterSurface + 3; this.vy = 0; }
            if (this.y > bedY - 3) { this.y = bedY - 3; this.vy = 0; }
            const throatX = bpWidth * 0.55;
            if (this.x > throatX - 60 && this.x < throatX + 30) {
                const centerY = (waterSurface + bedY) / 2;
                this.y = this.y * 0.93 + centerY * 0.07;
            }
            this.history.push({x: this.x, y: this.y});
            if (this.history.length > BP_CONFIG.maxHistory) this.history.shift();
            if (this.x > bpWidth + 20) this.reset();
        }
        draw(params) {
            if (!this.active) return;
            const throatX = bpWidth * 0.55;
            let color, alpha, glow;
            if (this.type === 'clear') {
                if (this.x > throatX - 25 && this.x < throatX + 40) {
                    color = 'rgba(6, 182, 212,'; alpha = 0.85; glow = '#06b6d4';
                } else {
                    color = 'rgba(59, 130, 246,'; alpha = 0.6; glow = '#3b82f6';
                }
            } else {
                color = 'rgba(217, 119, 6,'; alpha = 0.75; glow = '#d97706';
            }
            if (this.history.length > 2) {
                bpCtx.beginPath();
                bpCtx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) bpCtx.lineTo(this.history[i].x, this.history[i].y);
                bpCtx.strokeStyle = color + (alpha * 0.25) + ')';
                bpCtx.lineWidth = this.size * 0.4;
                bpCtx.stroke();
            }
            bpCtx.fillStyle = color + alpha + ')';
            bpCtx.shadowColor = glow;
            bpCtx.shadowBlur = this.type === 'clear' ? 6 : 4;
            bpCtx.beginPath();
            bpCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            bpCtx.fill();
            bpCtx.shadowBlur = 0;
        }
    }
    function initBpParticles() {
        bpParticles = [];
        for (let i = 0; i < BP_CONFIG.count; i++) {
            const p = new BpParticle();
            p.x = Math.random() * bpWidth;
            bpParticles.push(p);
        }
    }
    function drawBpStructure(params) {
        const throatX = bpWidth * 0.55;
        const bedGrad = bpCtx.createLinearGradient(0, bpHeight-50, 0, bpHeight);
        bedGrad.addColorStop(0, '#5c4033'); bedGrad.addColorStop(1, '#2d1f16');
        bpCtx.fillStyle = bedGrad;
        bpCtx.fillRect(0, bpHeight-50, bpWidth, 50);
        bpCtx.fillStyle = '#64748b';
        bpCtx.beginPath();
        bpCtx.moveTo(throatX - 40, bpHeight - 50);
        bpCtx.lineTo(throatX - 25, bpHeight - 90);
        bpCtx.lineTo(throatX - 25, bpHeight - 170);
        bpCtx.lineTo(throatX - 70, bpHeight - 160);
        bpCtx.lineTo(throatX - 85, bpHeight - 50);
        bpCtx.closePath();
        bpCtx.fill();
        bpCtx.beginPath();
        bpCtx.moveTo(throatX + 40, bpHeight - 50);
        bpCtx.lineTo(throatX + 25, bpHeight - 90);
        bpCtx.lineTo(throatX + 25, bpHeight - 170);
        bpCtx.lineTo(throatX + 70, bpHeight - 160);
        bpCtx.lineTo(throatX + 85, bpHeight - 50);
        bpCtx.closePath();
        bpCtx.fill();
        bpCtx.fillStyle = '#fbbf24';
        bpCtx.font = 'bold 11px "Noto Serif SC"';
        bpCtx.fillText('宝瓶口', throatX - 20, bpHeight - 185);
        bpCtx.font = '10px Inter';
        bpCtx.fillText(`${bpState.width}m`, throatX - 12, bpHeight - 175);
        bpCtx.fillStyle = '#94a3b8';
        bpCtx.font = '10px "Noto Serif SC"';
        const upstreamY = getBpWaterSurfaceY(50, params);
        bpCtx.fillText('内江来流', 30, upstreamY - 15);
        bpCtx.fillStyle = '#10b981';
        bpCtx.font = 'bold 11px "Noto Serif SC"';
        bpCtx.fillText('→成都', bpWidth - 55, bpHeight - 100);
        bpCtx.fillStyle = '#fbbf24';
        bpCtx.font = 'bold 13px Inter';
        bpCtx.fillText(`Fr = ${params.Fr.toFixed(2)}`, 10, 22);
        bpCtx.font = '10px Inter';
        bpCtx.fillStyle = params.Fr < 0.9 ? '#3b82f6' : params.Fr <= 1.1 ? '#06b6d4' : '#10b981';
        let regime = params.Fr < 0.9 ? 'Subcritical' : params.Fr <= 1.1 ? 'CRITICAL' : 'Supercritical';
        bpCtx.fillText(regime, 10, 37);
    }
    function updateBpStats(params) {
        document.getElementById('bpUpstreamLevel').textContent = '+' + params.upstreamLevel.toFixed(2);
        document.getElementById('bpFroudeNumber').textContent = params.Fr.toFixed(2);
        document.getElementById('bpVelocity').textContent = params.v.toFixed(1);
        document.getElementById('bpOverflowPercent').textContent = params.overflowRatio.toFixed(0) + '%';
        let clearCount = 0, sandCount = 0;
        bpParticles.forEach(p => {
            if (p.active) {
                if (p.type === 'clear') clearCount++;
                else sandCount++;
            }
        });
        document.getElementById('bpClearCount').textContent = clearCount;
        document.getElementById('bpSandCount').textContent = sandCount;
    }
    let lastBpTime = 0;
    function animateBp(timestamp) {
        if (timestamp - lastBpTime > 1000) {
            bpState.fps = Math.round(1000 / (timestamp - lastBpTime) * 60);
            document.getElementById('bpFps').textContent = Math.min(60, bpState.fps);
            lastBpTime = timestamp;
        }
        bpState.time++;
        const params = calculateBpHydraulics(bpState.flow, bpState.width);
        bpCtx.fillStyle = 'rgba(10, 22, 40, 0.35)';
        bpCtx.fillRect(0, 0, bpWidth, bpHeight);
        drawBpStructure(params);
        bpParticles.forEach(p => { p.update(params); p.draw(params); });
        const activeCount = bpParticles.filter(p => p.active && p.x < bpWidth + 30).length;
        if (activeCount < BP_CONFIG.count) {
            for (let i = 0; i < BP_CONFIG.spawnRate; i++) {
                const inactive = bpParticles.find(p => !p.active || p.x > bpWidth + 30);
                if (inactive) inactive.reset();
            }
        }
        updateBpStats(params);
        requestAnimationFrame(animateBp);
    }
    document.getElementById('bpFlowSlider').addEventListener('input', (e) => {
        bpState.flow = parseInt(e.target.value);
        document.getElementById('bpFlowValue').textContent = bpState.flow;
    });
    document.getElementById('bpWidthSlider').addEventListener('input', (e) => {
        bpState.width = parseInt(e.target.value);
        document.getElementById('bpWidthValue').textContent = bpState.width;
    });

    const fsCanvas = document.getElementById('feishaCanvas');
    const fsCtx = fsCanvas.getContext('2d');
    let fsWidth = 0, fsHeight = 0;
    function resizeFsCanvas() {
        const rect = fsCanvas.parentElement.getBoundingClientRect();
        fsCanvas.width = rect.width;
        fsCanvas.height = rect.height - 100;
        fsWidth = fsCanvas.width;
        fsHeight = fsCanvas.height;
    }
    const fsState = { flow: 2800, sediment: 2.5, mode: 'section', time: 0 };
    const WEIR_ELEV = 729.0;
    const BED_ELEV = 726.85;
    const CRITICAL_FLOW = 3200;
    class FsParticle {
        constructor() { this.reset(); }
        reset() {
            this.x = 30 + Math.random() * 50;
            this.y = 100 + Math.random() * 250;
            this.z = 1 - (this.y / fsHeight);
            this.vx = 2 + Math.random();
            this.vy = 0;
            this.life = 1;
            this.history = [];
            const sandProb = Math.min(0.8, (fsState.sediment / 8) * (0.2 + this.z * 0.8));
            this.type = Math.random() < sandProb ? 'sand' : 'water';
            if (this.type === 'sand') {
                this.size = 3 + Math.random() * 2;
                this.y = 350 + Math.random() * 60;
                this.z = 0.8 + Math.random() * 0.2;
            } else {
                this.size = 2 + Math.random();
                this.z = 0.1 + Math.random() * 0.5;
            }
        }
        update() {
            const w = fsWidth;
            const h = fsHeight;
            const flowRatio = fsState.flow / 5000;
            this.history.push({x: this.x, y: this.y});
            if (this.history.length > 15) this.history.shift();
            if (fsState.mode === 'section') {
                const depth = (h - 60) - this.y;
                const totalDepth = (h - 60) - 100;
                const depthRatio = Math.max(0.01, depth / totalDepth);
                const logVel = Math.log(1 + depthRatio * 9) / Math.log(10);
                const velocity = (1.5 + flowRatio * 3) * (0.3 + logVel * 0.7);
                this.x += velocity * 2.5;
                const weirX = w - 150;
                const weirTopY = h - 180;
                if (this.type === 'sand') {
                    if (this.y < h - 80) this.y += 0.4;
                    const transverseStrength = this.z * 0.8;
                    this.x += transverseStrength * 2;
                    if (this.x > weirX - 80 && this.x < weirX) {
                        this.vx *= 0.6;
                        const waterLevel = h - 90 - flowRatio * 80;
                        if (waterLevel > weirTopY) {
                            if (Math.random() < 0.4) this.x -= 1;
                        } else {
                            if (this.x > weirX - 30) {
                                this.x += 2;
                                this.y -= 0.8;
                            }
                        }
                    }
                } else {
                    if (this.y > h * 0.4) this.y -= 0.15;
                    if (this.x < weirX - 100) this.x -= 0.1;
                    if (this.x > w - 50) this.life -= 0.05;
                }
            } else {
                const centerY = h / 2;
                const progress = this.x / w;
                if (progress < 0.25) {
                    this.x += 3;
                } else if (progress < 0.7) {
                    const curveStrength = 0.6;
                    if (this.type === 'water') this.vy += curveStrength * 0.2;
                    else this.vy -= curveStrength * 0.25;
                    this.y += this.vy;
                    this.x += 2.5;
                    this.y += Math.sin(fsState.time * 0.05 + this.x * 0.02) * 0.4;
                } else {
                    if (this.type === 'sand' && this.y < centerY - 50) {
                        this.x += 1.5;
                        this.y -= 0.5;
                    } else if (this.type === 'water' && this.y > centerY + 30) {
                        this.x += 3;
                        this.y += 0.3;
                    } else {
                        this.x += 2;
                    }
                }
            }
            if (this.y < 30) { this.y = 30; this.vy *= -0.3; }
            if (this.y > h - 30) { this.y = h - 30; this.vy *= -0.3; }
            this.life -= 0.001;
            if (this.x > w + 50 || this.x < -50 || this.life <= 0) this.reset();
        }
        draw() {
            fsCtx.save();
            if (this.history.length > 2) {
                fsCtx.beginPath();
                fsCtx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) fsCtx.lineTo(this.history[i].x, this.history[i].y);
                fsCtx.strokeStyle = this.type === 'water' ? `rgba(59, 130, 246, ${0.15})` : `rgba(217, 119, 6, ${0.25})`;
                fsCtx.lineWidth = 1;
                fsCtx.stroke();
            }
            fsCtx.globalAlpha = this.life;
            if (this.type === 'water') {
                const grad = fsCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                grad.addColorStop(0, 'rgba(59, 130, 246, 0.8)');
                grad.addColorStop(1, 'rgba(59, 130, 246, 0)');
                fsCtx.fillStyle = grad;
                fsCtx.shadowColor = '#3b82f6';
                fsCtx.shadowBlur = 10;
            } else {
                const grad = fsCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
                grad.addColorStop(0, 'rgba(217, 119, 6, 0.9)');
                grad.addColorStop(0.5, 'rgba(180, 83, 9, 0.5)');
                grad.addColorStop(1, 'rgba(217, 119, 6, 0)');
                fsCtx.fillStyle = grad;
                fsCtx.shadowColor = '#d97706';
                fsCtx.shadowBlur = 8;
            }
            fsCtx.beginPath();
            fsCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            fsCtx.fill();
            fsCtx.restore();
        }
    }
    const fsParticles = [];
    for (let i = 0; i < 350; i++) fsParticles.push(new FsParticle());
    function drawFsStructure() {
        const w = fsWidth;
        const h = fsHeight;
        const flowRatio = fsState.flow / 5000;
        fsCtx.save();
        if (fsState.mode === 'section') {
            const bedGrad = fsCtx.createLinearGradient(0, h-60, 0, h);
            bedGrad.addColorStop(0, '#5c4033'); bedGrad.addColorStop(1, '#2d1f16');
            fsCtx.fillStyle = bedGrad;
            fsCtx.fillRect(0, h-60, w, 60);
            const weirX = w - 150;
            const weirBaseY = h - 60;
            const weirTopY = h - 180;
            fsCtx.fillStyle = '#8b5a2b';
            fsCtx.beginPath();
            fsCtx.moveTo(weirX - 30, weirBaseY);
            fsCtx.lineTo(weirX - 30, weirTopY);
            fsCtx.lineTo(weirX + 20, weirTopY);
            fsCtx.lineTo(weirX + 45, weirBaseY);
            fsCtx.closePath();
            fsCtx.fill();
            fsCtx.strokeStyle = '#fbbf24';
            fsCtx.lineWidth = 3;
            fsCtx.beginPath();
            fsCtx.moveTo(weirX - 30, weirTopY);
            fsCtx.lineTo(weirX + 20, weirTopY);
            fsCtx.stroke();
            const waterLevel = h - 90 - flowRatio * 80;
            const isOverflow = waterLevel <= weirTopY;
            fsCtx.strokeStyle = isOverflow ? 'rgba(239, 68, 68, 0.8)' : 'rgba(59, 130, 246, 0.6)';
            fsCtx.lineWidth = isOverflow ? 4 : 2;
            fsCtx.setLineDash(isOverflow ? [12, 6] : []);
            fsCtx.beginPath();
            fsCtx.moveTo(0, waterLevel);
            fsCtx.lineTo(weirX - 30, waterLevel);
            fsCtx.stroke();
            fsCtx.setLineDash([]);
            fsCtx.fillStyle = isOverflow ? 'rgba(239, 68, 68, 0.12)' : 'rgba(59, 130, 246, 0.08)';
            fsCtx.fillRect(0, waterLevel, weirX - 30, weirBaseY - waterLevel);
            if (isOverflow) {
                const overflowHeight = weirTopY - waterLevel;
                fsCtx.fillStyle = 'rgba(217, 119, 6, 0.7)';
                fsCtx.fillRect(weirX - 30, waterLevel, 50, overflowHeight);
                fsCtx.strokeStyle = '#ef4444';
                fsCtx.lineWidth = 3;
                fsCtx.beginPath();
                fsCtx.moveTo(weirX - 5, weirTopY - overflowHeight/2);
                fsCtx.lineTo(weirX + 50, weirTopY - overflowHeight/2 - 20);
                fsCtx.stroke();
                fsCtx.beginPath();
                fsCtx.moveTo(weirX + 50, weirTopY - overflowHeight/2 - 20);
                fsCtx.lineTo(weirX + 45, weirTopY - overflowHeight/2 - 15);
                fsCtx.lineTo(weirX + 43, weirTopY - overflowHeight/2 - 22);
                fsCtx.fillStyle = '#ef4444';
                fsCtx.fill();
                fsCtx.fillStyle = '#ef4444';
                fsCtx.font = 'bold 12px Inter';
                fsCtx.fillText('溢流排沙→外江', weirX + 10, weirTopY - overflowHeight - 10);
            }
            fsCtx.fillStyle = '#fbbf24';
            fsCtx.font = 'bold 12px Inter';
            fsCtx.fillText(`飞沙堰堰顶 ▽${WEIR_ELEV}m`, weirX - 40, weirTopY - 12);
            fsCtx.fillStyle = '#94a3b8';
            fsCtx.font = '11px Inter';
            fsCtx.fillText(`内江河床 ▽${BED_ELEV}m`, 20, h - 75);
            fsCtx.fillStyle = '#3b82f6';
            fsCtx.font = 'bold 13px "Noto Serif SC"';
            fsCtx.fillText('【内江】清水入口', 50, h - 110);
            fsCtx.fillStyle = '#ef4444';
            fsCtx.fillText('【外江】排沙出口', weirX + 30, 100);
        } else {
            const centerY = h / 2;
            fsCtx.strokeStyle = 'rgba(148, 163, 184, 0.4)';
            fsCtx.lineWidth = 2;
            fsCtx.setLineDash([10, 8]);
            fsCtx.beginPath();
            fsCtx.moveTo(0, 60);
            fsCtx.bezierCurveTo(w*0.3, 60, w*0.45, 40, w*0.65, 90);
            fsCtx.lineTo(w, 100);
            fsCtx.stroke();
            fsCtx.beginPath();
            fsCtx.moveTo(0, h - 60);
            fsCtx.bezierCurveTo(w*0.3, h-60, w*0.45, h-40, w*0.65, h-90);
            fsCtx.lineTo(w, h-100);
            fsCtx.stroke();
            fsCtx.setLineDash([]);
            const weirX = w * 0.68;
            fsCtx.fillStyle = 'rgba(139, 90, 43, 0.9)';
            fsCtx.fillRect(weirX, 80, 50, h - 160);
            fsCtx.strokeStyle = 'rgba(251, 191, 36, 0.25)';
            fsCtx.lineWidth = 2;
            fsCtx.beginPath();
            fsCtx.ellipse(w*0.4, centerY, 80, 50, 0, 0, Math.PI * 2);
            fsCtx.stroke();
            fsCtx.fillStyle = '#fbbf24';
            fsCtx.font = 'bold 13px "Noto Serif SC"';
            fsCtx.fillText('弯道环流区', w*0.35, centerY - 70);
            fsCtx.fillStyle = '#3b82f6';
            fsCtx.fillText('内江（清水）', w - 120, h - 70);
            fsCtx.fillStyle = '#ef4444';
            fsCtx.fillText('外江（排沙）', w - 120, 70);
        }
        fsCtx.restore();
    }
    function animateFs() {
        fsState.time++;
        fsCtx.fillStyle = 'rgba(10, 22, 40, 0.25)';
        fsCtx.fillRect(0, 0, fsWidth, fsHeight);
        drawFsStructure();
        fsParticles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateFs);
    }
    function setFsMode(mode) {
        fsState.mode = mode;
        fsParticles.forEach(p => p.reset());
    }
    window.setFsMode = setFsMode;
    document.getElementById('fsFlowSlider').addEventListener('input', (e) => {
        fsState.flow = parseInt(e.target.value);
        document.getElementById('fsFlowValue').textContent = fsState.flow;
    });
    document.getElementById('fsSedimentSlider').addEventListener('input', (e) => {
        fsState.sediment = parseFloat(e.target.value);
        document.getElementById('fsSedimentValue').textContent = fsState.sediment.toFixed(1);
        fsParticles.forEach(p => p.reset());
    });

    window.addEventListener('resize', () => {
        resizeBpCanvas();
        resizeFsCanvas();
    });
    setTimeout(() => {
        resizeBpCanvas();
        initBpParticles();
        animateBp(0);
        resizeFsCanvas();
        animateFs();
    }, 100);
</script>
